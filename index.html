<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CloudFront Project</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--light);
            color: var(--dark);
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        p {
            line-height: 1.6;
            color: #64748b;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #dcfce7;
            color: #166534;
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello, AWS!</h1>
        <p>This website is being served globally via <strong>Amazon CloudFront</strong> and stored in <strong>S3</strong>.</p>
        
        <div class="status-badge">Successfully Deployed</div>

        <footer>
            Cloud-Native Static Website
        </footer>
    </div>

</body>
</html>
